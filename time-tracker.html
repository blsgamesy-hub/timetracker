<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 하루 트래커</title>
<link rel="manifest" href="./manifest_time-tracker.json">
<meta name="theme-color" content="#1C1917">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="하루 트래커">
<link rel="apple-touch-icon" href="./icon_192_time-tracker.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0E8;
    --surface: #FDFAF4;
    --ink: #1C1917;
    --ink-light: #78716C;
    --ink-faint: #D6D0C4;
    --accent: #C0392B;
    --border: #E5DDD0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    padding: 14px 24px 12px;
    border-bottom: 1.5px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    flex-shrink: 0;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  header .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--ink-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 250px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    border-right: 1.5px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* 달력 */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .cal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
  }
  .cal-nav {
    background: none;
    border: 1px solid var(--border);
    width: 26px; height: 26px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-light);
    transition: background 0.15s;
  }
  .cal-nav:hover { background: var(--bg); }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    text-align: center;
  }
  .cal-dow {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: var(--ink-light);
    padding: 4px 0;
  }
  .cal-day {
    font-size: 0.73rem;
    padding: 5px 0;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .cal-day:hover { background: var(--bg); }
  .cal-day.today { font-weight: 500; color: var(--accent); }
  .cal-day.selected { background: var(--ink); color: #fff; border-radius: 50%; font-weight: 700; }
  .cal-day.has-data { font-weight: 700; }
  .cal-day.has-memo { outline: 2px solid var(--ink); outline-offset: -2px; border-radius: 50%; }
  .cal-day.selected.has-memo { outline: 2px solid #fff; }
  .cal-day.other-month { color: var(--ink-faint); }

  /* 메모 */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 8px;
  }
  .memo-area {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.8rem;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    resize: vertical;
    min-height: 64px;
    transition: border-color 0.15s;
    line-height: 1.6;
  }
  .memo-area:focus { border-color: var(--ink-light); }

  .section-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2px 0;
  }

  /* ── MAIN ── */
  .main {
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .date-label {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
  }

  /* ── 시간 분포 바 ── */
  .viz-section {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .viz-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 12px;
  }
  .bars-wrap { display: flex; flex-direction: column; gap: 9px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label {
    font-size: 0.76rem;
    width: 72px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bar-track {
    flex: 1;
    height: 16px;
    background: var(--bg);
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
    min-width: 2px;
  }
  .bar-time {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--ink-light);
    width: 44px;
    text-align: right;
    flex-shrink: 0;
  }
  .total-row {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .total-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-light);
  }
  .total-val {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
  }

  /* ── 24시간 타임라인 ── */
  .timeline-section {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .timeline-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .timeline-legend {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.65rem;
    color: var(--ink-light);
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* 타임라인 그리드 */
  .tl-grid {
    display: flex;
    flex-direction: column;
    gap: 2px;
    user-select: none;
  }
  .tl-row {
    display: grid;
    grid-template-columns: 36px repeat(4, 1fr);
    gap: 2px;
    align-items: center;
  }
  .tl-hour {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--ink-light);
    text-align: right;
    padding-right: 6px;
    cursor: pointer;
    border-radius: 3px;
    padding: 4px 6px 4px 0;
    transition: all 0.1s;
    line-height: 1;
  }
  .tl-hour:hover { color: var(--ink); background: var(--bg); }
  .tl-hour.selected {
    background: var(--ink);
    color: #fff;
    border-radius: 4px;
    padding-left: 4px;
    font-weight: 500;
  }

  .tl-slot {
    height: 24px;
    border-radius: 4px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: all 0.12s;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .tl-slot:hover { border-color: var(--ink-faint); }
  .tl-slot.filled { border-color: transparent; }
  .tl-slot.drag-over {
    border-color: var(--ink);
    border-style: dashed;
    opacity: 0.7;
  }
  .tl-slot-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.58rem;
    font-family: 'DM Mono', monospace;
    color: rgba(255,255,255,0.9);
    pointer-events: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 3px;
  }

  /* ── 선택된 시간대 패널 ── */
  .selected-panel {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    transition: opacity 0.2s;
  }
  .selected-panel.dimmed { opacity: 0.4; pointer-events: none; }

  .panel-hour-label {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    margin-bottom: 4px;
    min-height: 1.4em;
  }
  .panel-slots-preview {
    display: flex;
    gap: 4px;
    margin-bottom: 14px;
  }
  .panel-slot-pip {
    flex: 1;
    height: 8px;
    border-radius: 2px;
    background: var(--bg);
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .panel-slot-pip.filled { border-color: transparent; }

  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 7px;
    margin-bottom: 10px;
  }
  .cat-btn {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 9px 10px;
    cursor: pointer;
    text-align: left;
    font-size: 0.78rem;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink);
    transition: all 0.13s;
    position: relative;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .cat-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 7px 0 0 7px;
  }
  .cat-btn:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.08); }
  .cat-btn:active { transform: scale(0.97); }

  .panel-actions {
    display: flex;
    gap: 8px;
  }
  .erase-btn {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 7px 14px;
    cursor: pointer;
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    color: var(--ink-light);
    transition: all 0.13s;
    letter-spacing: 0.03em;
  }
  .erase-btn:hover { background: #fef2f2; color: var(--accent); border-color: #fca5a5; }

  .tl-slot.longpress-ready {
    border-color: var(--ink-light);
    background: var(--ink-faint);
    transition: all 0.1s;
  }
  .tl-slot.longpress-ready.filled {
    filter: brightness(1.15);
  }

  /* ── 카테고리 관리 ── */
  .manage-section {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .manage-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    padding: 14px 20px;
    user-select: none;
  }
  .manage-toggle:hover { background: var(--bg); }
  .manage-arrow {
    font-size: 0.65rem;
    color: var(--ink-light);
    transition: transform 0.2s;
  }
  .manage-toggle.open .manage-arrow { transform: rotate(180deg); }
  .manage-body {
    display: none;
    flex-direction: column;
    gap: 10px;
    padding: 0 20px 16px;
    border-top: 1px solid var(--border);
  }
  .manage-body.open { display: flex; }

  .manage-row {
    display: flex;
    gap: 8px;
    align-items: center;
    padding-top: 12px;
  }
  .manage-input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.8rem;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .manage-input:focus { border-color: var(--ink-light); }
  .manage-btn {
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.76rem;
    cursor: pointer;
    background: var(--ink);
    color: #fff;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .manage-btn:hover { opacity: 0.8; }

  .color-picker-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .color-dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
  }
  .color-dot:hover { transform: scale(1.2); }
  .color-dot.selected { border-color: var(--ink); }

  .cat-list { display: flex; flex-direction: column; gap: 5px; }
  .cat-list-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
  }
  .cat-list-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .cat-list-name { font-size: 0.8rem; flex: 1; }
  .cat-list-actions { display: flex; gap: 4px; }
  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 26px; height: 26px;
    cursor: pointer;
    font-size: 0.72rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-light);
    transition: all 0.12s;
  }
  .icon-btn:hover { background: var(--bg); color: var(--ink); }
  .icon-btn.danger:hover { background: #fef2f2; color: var(--accent); border-color: #fca5a5; }

  /* ── 리포트 ── */
  .report-section {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .report-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .report-tab {
    padding: 5px 14px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    background: var(--bg);
    color: var(--ink-light);
    transition: all 0.15s;
  }
  .report-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .report-period {
    font-family: 'DM Serif Display', serif;
    font-size: 0.95rem;
    margin-bottom: 4px;
  }
  .report-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--ink-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .report-bars { display: flex; flex-direction: column; gap: 9px; }
  .report-total-row {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* ── 모달 ── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(28,25,23,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    width: 300px;
    transform: translateY(12px);
    transition: transform 0.2s;
    box-shadow: 0 20px 40px rgba(0,0,0,0.12);
  }
  .modal-backdrop.open .modal { transform: translateY(0); }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.05rem; margin-bottom: 14px; }
  .modal-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 6px;
    display: block;
  }
  .modal-input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.82rem;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.15s;
  }
  .modal-input:focus { border-color: var(--ink-light); }
  .modal-color-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn {
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 7px 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.12s;
  }
  .modal-btn.cancel { background: var(--bg); color: var(--ink-light); }
  .modal-btn.cancel:hover { color: var(--ink); }
  .modal-btn.confirm { background: var(--ink); color: #fff; border-color: var(--ink); }
  .modal-btn.confirm:hover { opacity: 0.8; }
  .modal-btn.danger-btn { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal-btn.danger-btn:hover { opacity: 0.85; }

  /* ── 드래그 선택 오버레이 ── */
  .drag-cat-modal {
    position: fixed;
    inset: 0;
    background: rgba(28,25,23,0.5);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .drag-cat-modal.open { opacity: 1; pointer-events: all; }
  .drag-cat-sheet {
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    padding: 20px 24px 32px;
    width: 100%;
    max-width: 480px;
    transform: translateY(20px);
    transition: transform 0.2s;
  }
  .drag-cat-modal.open .drag-cat-sheet { transform: translateY(0); }
  .drag-sheet-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 4px;
  }
  .drag-sheet-range {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    margin-bottom: 14px;
  }
  .drag-cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px;
  }
  .drag-sheet-cancel {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.8rem;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.13s;
  }
  .drag-sheet-cancel:hover { color: var(--ink); }
  .drag-sheet-erase {
    padding: 10px 16px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.13s;
    white-space: nowrap;
  }
  .drag-sheet-erase:hover { background: #fef2f2; color: var(--accent); border-color: #fca5a5; }

  /* ── 토스트 ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: #fff;
    padding: 9px 18px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    transition: transform 0.3s ease;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* 빈 상태 */
  .empty-state {
    text-align: center;
    padding: 24px 0;
    color: var(--ink-light);
    font-size: 0.8rem;
    line-height: 2;
  }

  /* 반응형 */
  @media (max-width: 680px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1.5px solid var(--border); }
    .main { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <h1>나의 하루</h1>
  <span class="subtitle">Time Tracker · Auto-save on</span>
</header>

<script>
/* ── 상수 ── */
const COLORS = [
  '#E07B54','#5B8DB8','#6BAA75','#C17FBF',
  '#D4A843','#E85E5E','#5EC4C4','#9B8EA8',
  '#A0522D','#4682B4','#3CB371','#DA70D6'
];
const DOW = ['일','월','화','수','목','금','토'];
const SLOTS_PER_HOUR = 4;   // 15분 × 4 = 60분
const SLOT_MIN = 15;

/* ── 상태 ── */
let state = {
  categories: [
    { id: 1, name: '작업', color: '#5B8DB8' },
    { id: 2, name: '운동', color: '#6BAA75' },
    { id: 3, name: '독서', color: '#D4A843' },
    { id: 4, name: '휴식', color: '#C17FBF' },
  ],
  // timeline: { 'YYYY-MM-DD': { 'H-S': catId } }  H=0~23, S=0~3
  timeline: {},
  memos: {},
  calYear: 0,
  calMonth: 0,
  selectedDate: '',
  selectedHour: null,
  selectedColor: COLORS[0],
};

/* ── 스토리지 키 v2 (기존 logs 데이터와 분리) ── */
function save() {
  localStorage.setItem('dayTracker_v2', JSON.stringify({
    categories: state.categories,
    timeline: state.timeline,
    memos: state.memos,
  }));
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('dayTracker_v2') || '{}');
    if (d.categories) state.categories = d.categories;
    if (d.timeline) state.timeline = d.timeline;
    if (d.memos) state.memos = d.memos;
  } catch(e) {}
}

/* ── 헬퍼 ── */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function tlKey(h, s) { return `${h}-${s}`; }
function fmtMin(min) {
  const h = Math.floor(min / 60), m = min % 60;
  if (h === 0) return `${m}m`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}
function fmtDateLabel(ds) {
  const [y, m, d] = ds.split('-').map(Number);
  const names = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const dt = new Date(y, m-1, d);
  return `${y}년 ${names[m-1]} ${d}일 (${DOW[dt.getDay()]})`;
}
function fmtHour(h) {
  return `${String(h).padStart(2,'0')}:00 — ${String(h).padStart(2,'0')}:59`;
}
function getCat(id) { return state.categories.find(c => c.id === id); }

/* ── 달력 ── */
function renderCalendar() {
  const { calYear: y, calMonth: m } = state;
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calTitle').textContent = `${y}년 ${months[m]}`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  DOW.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const prevDays = new Date(y, m, 0).getDate();
  for (let i = firstDay - 1; i >= 0; i--) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = prevDays - i;
    grid.appendChild(el);
  }
  const today = todayStr();
  for (let d = 1; d <= daysInMonth; d++) {
    const key = dateKey(y, m, d);
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;
    if (key === today) el.classList.add('today');
    if (key === state.selectedDate) el.classList.add('selected');
    const tl = state.timeline[key] || {};
    if (Object.keys(tl).length > 0) el.classList.add('has-data');
    if (state.memos[key]?.trim()) el.classList.add('has-memo');
    el.addEventListener('click', () => selectDate(key));
    grid.appendChild(el);
  }
  const total = firstDay + daysInMonth;
  const remain = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= remain; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = d;
    grid.appendChild(el);
  }
}

/* ── 날짜 선택 ── */
function selectDate(ds) {
  state.selectedDate = ds;
  state.selectedHour = null;
  document.getElementById('dateLabel').textContent = fmtDateLabel(ds);
  document.getElementById('memoArea').value = state.memos[ds] || '';
  renderCalendar();
  renderBars();
  renderTimeline();
  renderSelectedPanel();
  renderReport();
}

/* ── 시간 분포 바 ── */
function renderBars() {
  const tl = state.timeline[state.selectedDate] || {};
  const totals = {};
  Object.values(tl).forEach(catId => {
    totals[catId] = (totals[catId] || 0) + 1;
  });
  const totalMin = Object.values(totals).reduce((a,b) => a+b, 0) * SLOT_MIN;
  document.getElementById('totalTime').textContent = totalMin > 0 ? fmtMin(totalMin) : '0m';

  const active = state.categories
    .map(c => ({ ...c, min: (totals[c.id] || 0) * SLOT_MIN }))
    .filter(c => c.min > 0)
    .sort((a,b) => b.min - a.min);

  const wrap = document.getElementById('barsWrap');
  if (active.length === 0) {
    wrap.innerHTML = '<div class="empty-state">아직 기록이 없어요<br>타임라인에서 시간대를 선택해보세요 ✨</div>';
    return;
  }
  const maxMin = Math.max(...active.map(c => c.min));
  wrap.innerHTML = active.map(c => `
    <div class="bar-row">
      <div class="bar-label" title="${c.name}">${c.name}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(c.min/maxMin)*100}%;background:${c.color}"></div>
      </div>
      <div class="bar-time">${fmtMin(c.min)}</div>
    </div>
  `).join('');

  // 범례
  const legend = document.getElementById('tlLegend');
  legend.innerHTML = active.map(c => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${c.color}"></div>
      <span>${c.name}</span>
    </div>
  `).join('');
}

/* ── 타임라인 ── */
function renderTimeline() {
  const grid = document.getElementById('tlGrid');
  const tl = state.timeline[state.selectedDate] || {};
  grid.innerHTML = '';

  for (let h = 0; h < 24; h++) {
    const row = document.createElement('div');
    row.className = 'tl-row';

    // 시간 레이블
    const hourEl = document.createElement('div');
    hourEl.className = 'tl-hour' + (state.selectedHour === h ? ' selected' : '');
    hourEl.textContent = String(h).padStart(2,'0');
    hourEl.addEventListener('click', () => {
      state.selectedHour = (state.selectedHour === h) ? null : h;
      renderTimeline();
      renderSelectedPanel();
    });
    row.appendChild(hourEl);

    // 4개 슬롯
    for (let s = 0; s < SLOTS_PER_HOUR; s++) {
      const key = tlKey(h, s);
      const catId = tl[key];
      const cat = catId ? getCat(catId) : null;

      const slot = document.createElement('div');
      slot.className = 'tl-slot' + (cat ? ' filled' : '');
      slot.dataset.hour = h;
      slot.dataset.slot = s;
      if (cat) {
        slot.style.background = cat.color;
        const label = document.createElement('div');
        label.className = 'tl-slot-label';
        label.textContent = cat.name;
        slot.appendChild(label);
      }
      row.appendChild(slot);
    }

    grid.appendChild(row);
  }

  // 드래그 이벤트 연결
  setupDrag();
}

/* ── 선택된 시간대 패널 ── */
function renderSelectedPanel() {
  const panel = document.getElementById('selectedPanel');
  const h = state.selectedHour;

  if (h === null) {
    panel.classList.add('dimmed');
    document.getElementById('panelHourLabel').textContent = '—';
    document.getElementById('panelSlotsPreview').innerHTML = '';
    document.getElementById('catGrid').innerHTML = '';
    return;
  }

  panel.classList.remove('dimmed');
  document.getElementById('panelHourLabel').textContent = fmtHour(h);

  // 슬롯 미리보기 핍
  const tl = state.timeline[state.selectedDate] || {};
  const preview = document.getElementById('panelSlotsPreview');
  preview.innerHTML = '';
  for (let s = 0; s < SLOTS_PER_HOUR; s++) {
    const key = tlKey(h, s);
    const catId = tl[key];
    const cat = catId ? getCat(catId) : null;
    const pip = document.createElement('div');
    pip.className = 'panel-slot-pip' + (cat ? ' filled' : '');
    if (cat) pip.style.background = cat.color;
    preview.appendChild(pip);
  }

  // 카테고리 버튼
  const catGrid = document.getElementById('catGrid');
  catGrid.innerHTML = state.categories.map(c => `
    <button class="cat-btn" data-catid="${c.id}"
      style="--cc:${c.color}; padding-left:14px;">
      <span style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${c.color};border-radius:7px 0 0 7px;"></span>
      ${c.name}
    </button>
  `).join('');
  catGrid.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => fillSlot(h, Number(btn.dataset.catid)));
  });
}

/* ── 슬롯 채우기 ── */
function fillSlot(hour, catId) {
  if (!state.timeline[state.selectedDate]) state.timeline[state.selectedDate] = {};
  const tl = state.timeline[state.selectedDate];

  // 빈 슬롯 찾기
  let targetSlot = null;
  for (let s = 0; s < SLOTS_PER_HOUR; s++) {
    if (!tl[tlKey(hour, s)]) { targetSlot = s; break; }
  }

  if (targetSlot !== null) {
    // 빈 슬롯에 채움
    tl[tlKey(hour, targetSlot)] = catId;
    save();
    renderTimeline();
    renderSelectedPanel();
    renderBars();
    renderCalendar();
    const cat = getCat(catId);
    showToast(`${String(hour).padStart(2,'0')}시 · ${cat?.name} +${SLOT_MIN}m`);
  } else {
    // 4칸 꽉 참 → 다음 시간대로 자동 이동 후 채움
    const nextHour = hour + 1;
    if (nextHour >= 24) { showToast('23시까지만 기록할 수 있어요'); return; }
    state.selectedHour = nextHour;
    if (!state.timeline[state.selectedDate]) state.timeline[state.selectedDate] = {};
    const nextTl = state.timeline[state.selectedDate];
    let nextSlot = null;
    for (let s = 0; s < SLOTS_PER_HOUR; s++) {
      if (!nextTl[tlKey(nextHour, s)]) { nextSlot = s; break; }
    }
    if (nextSlot !== null) {
      nextTl[tlKey(nextHour, nextSlot)] = catId;
      save();
      renderTimeline();
      renderSelectedPanel();
      renderBars();
      renderCalendar();
      const cat = getCat(catId);
      showToast(`→ ${String(nextHour).padStart(2,'0')}시로 이동 · ${cat?.name} +${SLOT_MIN}m`);
    } else {
      showToast('다음 시간대도 꽉 찼어요');
    }
  }
}

/* ── 지우기 ── */
document.getElementById('eraseBtn').addEventListener('click', () => {
  const h = state.selectedHour;
  if (h === null) return;
  const tl = state.timeline[state.selectedDate];
  if (!tl) { showToast('기록이 없어요'); return; }
  for (let s = SLOTS_PER_HOUR - 1; s >= 0; s--) {
    const key = tlKey(h, s);
    if (tl[key]) {
      delete tl[key];
      save();
      renderTimeline();
      renderSelectedPanel();
      renderBars();
      renderCalendar();
      showToast(`−${SLOT_MIN}m 삭제됨`);
      return;
    }
  }
  showToast('이 시간대엔 기록이 없어요');
});

/* ── 드래그 선택 ── */
let dragStart = null;
let dragEnd = null;
let isDragging = false;
let pendingDragRange = [];
let longPressTimer = null;
let longPressReady = false;  // 1초 꾹 누름 완료 여부

function slotIndex(h, s) { return h * SLOTS_PER_HOUR + s; }
function indexToHS(idx) { return { h: Math.floor(idx / SLOTS_PER_HOUR), s: idx % SLOTS_PER_HOUR }; }

function setupDrag() {
  const grid = document.getElementById('tlGrid');

  // 마우스: 항상 동작
  grid.addEventListener('mousedown', onDragStart);
  window.addEventListener('mousemove', onDragMove);
  window.addEventListener('mouseup', onDragEnd);

  // 터치: 롱프레스 후 드래그
  grid.addEventListener('touchstart', onTouchStart, { passive: false });
  window.addEventListener('touchmove', onTouchMove, { passive: false });
  window.addEventListener('touchend', onTouchEnd);
}

function getSlotFromEvent(e) {
  const el = e.target.closest('.tl-slot');
  if (!el) return null;
  return { h: Number(el.dataset.hour), s: Number(el.dataset.slot) };
}
function getSlotFromPoint(x, y) {
  const el = document.elementFromPoint(x, y)?.closest('.tl-slot');
  if (!el) return null;
  return { h: Number(el.dataset.hour), s: Number(el.dataset.slot) };
}

function onDragStart(e) {
  const pos = getSlotFromEvent(e);
  if (!pos) return;
  dragStart = pos;
  dragEnd = pos;
  isDragging = false;
  highlightDrag();
}
function onDragMove(e) {
  if (!dragStart) return;
  const pos = getSlotFromPoint(e.clientX, e.clientY);
  if (!pos) return;
  if (pos.h !== dragEnd?.h || pos.s !== dragEnd?.s) {
    isDragging = true;
    dragEnd = pos;
    highlightDrag();
  }
}
function onDragEnd(e) {
  if (!dragStart) return;
  if (isDragging && dragEnd) {
    openDragSheet();
  }
  // 단순 탭(드래그 아님)은 슬롯 클릭 무시 (시간 레이블로 선택하는 방식 유지)
  clearDragHighlight();
  dragStart = null;
  dragEnd = null;
  isDragging = false;
}

function onTouchStart(e) {
  const touch = e.touches[0];
  const pos = getSlotFromPoint(touch.clientX, touch.clientY);
  if (!pos) return;

  longPressReady = false;
  longPressTimer = setTimeout(() => {
    // 1초 꾹 누름 완료 → 드래그 모드 진입
    longPressReady = true;
    dragStart = pos;
    dragEnd = pos;
    isDragging = false;
    // 시각 피드백
    const el = document.querySelector(`.tl-slot[data-hour="${pos.h}"][data-slot="${pos.s}"]`);
    if (el) el.classList.add('longpress-ready');
    // 스크롤 잠금
    document.getElementById('tlGrid').style.touchAction = 'none';
  }, 1000);
}
function onTouchMove(e) {
  if (!longPressReady || !dragStart) {
    // 롱프레스 전에 움직이면 타이머 취소
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    return;
  }
  e.preventDefault();
  const touch = e.touches[0];
  const pos = getSlotFromPoint(touch.clientX, touch.clientY);
  if (!pos) return;
  if (pos.h !== dragEnd?.h || pos.s !== dragEnd?.s) {
    isDragging = true;
    dragEnd = pos;
    highlightDrag();
  }
}
function onTouchEnd(e) {
  clearTimeout(longPressTimer);
  longPressTimer = null;
  document.querySelectorAll('.tl-slot.longpress-ready').forEach(el => el.classList.remove('longpress-ready'));
  document.getElementById('tlGrid').style.touchAction = '';

  if (longPressReady && isDragging && dragEnd) {
    openDragSheet();
  }
  longPressReady = false;
  clearDragHighlight();
  dragStart = null;
  dragEnd = null;
  isDragging = false;
}

function getDragRange() {
  if (!dragStart || !dragEnd) return [];
  const a = slotIndex(dragStart.h, dragStart.s);
  const b = slotIndex(dragEnd.h, dragEnd.s);
  const min = Math.min(a, b), max = Math.max(a, b);
  const result = [];
  for (let i = min; i <= max; i++) result.push(indexToHS(i));
  return result;
}

function highlightDrag() {
  clearDragHighlight();
  getDragRange().forEach(({ h, s }) => {
    const slot = document.querySelector(`.tl-slot[data-hour="${h}"][data-slot="${s}"]`);
    if (slot) slot.classList.add('drag-over');
  });
}

function clearDragHighlight() {
  document.querySelectorAll('.tl-slot.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function openDragSheet() {
  const range = getDragRange();
  if (range.length === 0) return;
  pendingDragRange = range;  // 시트 열리는 시점에 범위 저장

  const first = range[0], last = range[range.length - 1];
  const startLabel = `${String(first.h).padStart(2,'0')}:${first.s === 0 ? '00' : first.s === 1 ? '15' : first.s === 2 ? '30' : '45'}`;
  const endH = last.s === 3 ? last.h + 1 : last.h;
  const endM = last.s === 3 ? '00' : last.s === 0 ? '15' : last.s === 1 ? '30' : '45';
  const endLabel = `${String(endH).padStart(2,'0')}:${endM}`;

  document.getElementById('dragSheetRange').textContent =
    `${startLabel} — ${endLabel} (${range.length * SLOT_MIN}분)`;

  const catGrid = document.getElementById('dragCatGrid');
  catGrid.innerHTML = state.categories.map(c => `
    <button class="cat-btn" data-catid="${c.id}" style="padding-left:14px;">
      <span style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${c.color};border-radius:7px 0 0 7px;"></span>
      ${c.name}
    </button>
  `).join('');
  catGrid.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      fillDragRange(pendingDragRange, Number(btn.dataset.catid));
      closeDragSheet();
    });
  });

  document.getElementById('dragCatModal').classList.add('open');
}

function closeDragSheet() {
  document.getElementById('dragCatModal').classList.remove('open');
  pendingDragRange = [];
}

document.getElementById('dragSheetCancel').addEventListener('click', closeDragSheet);
document.getElementById('dragSheetErase').addEventListener('click', () => {
  const range = pendingDragRange;
  if (!state.timeline[state.selectedDate]) { closeDragSheet(); return; }
  const tl = state.timeline[state.selectedDate];
  range.forEach(({ h, s }) => { delete tl[tlKey(h, s)]; });
  save();
  renderTimeline();
  renderBars();
  renderSelectedPanel();
  renderCalendar();
  closeDragSheet();
  showToast(`${range.length * SLOT_MIN}분 삭제됨`);
});
document.getElementById('dragCatModal').addEventListener('click', e => {
  if (e.target === document.getElementById('dragCatModal')) closeDragSheet();
});

function fillDragRange(range, catId) {
  if (!state.timeline[state.selectedDate]) state.timeline[state.selectedDate] = {};
  const tl = state.timeline[state.selectedDate];
  range.forEach(({ h, s }) => {
    tl[tlKey(h, s)] = catId;
  });
  save();
  renderTimeline();
  renderBars();
  renderSelectedPanel();
  renderCalendar();
  const cat = getCat(catId);
  showToast(`${cat?.name} · ${range.length * SLOT_MIN}분 기록됨`);
}

/* ── 카테고리 관리 접기/펼치기 ── */
document.getElementById('manageToggle').addEventListener('click', () => {
  document.getElementById('manageToggle').classList.toggle('open');
  document.getElementById('manageBody').classList.toggle('open');
});

/* ── 색상 피커 ── */
function renderColorPicker(wrapperId = 'colorPicker', selected = null, onSelect = null) {
  const wrap = document.getElementById(wrapperId);
  const sel = selected ?? state.selectedColor;
  wrap.innerHTML = COLORS.map(c => `
    <div class="color-dot ${c === sel ? 'selected' : ''}" style="background:${c}" data-color="${c}"></div>
  `).join('');
  wrap.querySelectorAll('.color-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      if (onSelect) onSelect(dot.dataset.color);
      else state.selectedColor = dot.dataset.color;
      renderColorPicker(wrapperId, dot.dataset.color, onSelect);
    });
  });
}

/* ── 카테고리 추가 ── */
document.getElementById('addCatBtn').addEventListener('click', () => {
  const nameEl = document.getElementById('newCatName');
  const name = nameEl.value.trim();
  if (!name) return;
  if (state.categories.length >= 12) { showToast('최대 12개까지 추가할 수 있어요'); return; }
  state.categories.push({ id: Date.now(), name, color: state.selectedColor });
  save();
  nameEl.value = '';
  renderColorPicker();
  renderCatManageList();
  renderSelectedPanel();
  showToast(`"${name}" 추가됨!`);
});
document.getElementById('newCatName').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('addCatBtn').click();
});

/* ── 카테고리 목록 ── */
function renderCatManageList() {
  const list = document.getElementById('catManageList');
  if (state.categories.length === 0) {
    list.innerHTML = '<div style="font-size:0.76rem;color:var(--ink-light);padding:6px 0">카테고리를 추가해보세요</div>';
    return;
  }
  list.innerHTML = state.categories.map(c => `
    <div class="cat-list-item">
      <div class="cat-list-dot" style="background:${c.color}"></div>
      <span class="cat-list-name">${c.name}</span>
      <div class="cat-list-actions">
        <button class="icon-btn" data-edit="${c.id}">✏️</button>
        <button class="icon-btn danger" data-del="${c.id}">🗑</button>
      </div>
    </div>
  `).join('');
  list.querySelectorAll('[data-edit]').forEach(btn =>
    btn.addEventListener('click', () => openEditModal(Number(btn.dataset.edit))));
  list.querySelectorAll('[data-del]').forEach(btn =>
    btn.addEventListener('click', () => openDeleteModal(Number(btn.dataset.del))));
}

/* ── 수정 모달 ── */
let editingId = null, editSelectedColor = COLORS[0];
function openEditModal(catId) {
  const cat = getCat(catId);
  if (!cat) return;
  editingId = catId;
  editSelectedColor = cat.color;
  document.getElementById('editName').value = cat.name;
  renderColorPicker('editColorPicker', cat.color, c => { editSelectedColor = c; });
  document.getElementById('editModal').classList.add('open');
}
document.getElementById('editConfirm').addEventListener('click', () => {
  const name = document.getElementById('editName').value.trim();
  if (!name) return;
  const cat = getCat(editingId);
  if (!cat) return;
  cat.name = name;
  cat.color = editSelectedColor;
  save();
  document.getElementById('editModal').classList.remove('open');
  renderCatManageList();
  renderTimeline();
  renderSelectedPanel();
  renderBars();
  showToast('수정됨 ✓');
});
document.getElementById('editCancel').addEventListener('click', () =>
  document.getElementById('editModal').classList.remove('open'));
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal'))
    document.getElementById('editModal').classList.remove('open');
});

/* ── 삭제 모달 ── */
let deletingId = null;
function openDeleteModal(catId) {
  const cat = getCat(catId);
  if (!cat) return;
  deletingId = catId;
  document.getElementById('deleteTargetName').textContent = cat.name;
  document.getElementById('deleteModal').classList.add('open');
}
document.getElementById('deleteConfirm').addEventListener('click', () => {
  state.categories = state.categories.filter(c => c.id !== deletingId);
  Object.keys(state.timeline).forEach(date => {
    Object.keys(state.timeline[date]).forEach(key => {
      if (state.timeline[date][key] === deletingId) delete state.timeline[date][key];
    });
  });
  save();
  document.getElementById('deleteModal').classList.remove('open');
  renderCatManageList();
  renderTimeline();
  renderSelectedPanel();
  renderBars();
  showToast('삭제됨');
});
document.getElementById('deleteCancel').addEventListener('click', () =>
  document.getElementById('deleteModal').classList.remove('open'));
document.getElementById('deleteModal').addEventListener('click', e => {
  if (e.target === document.getElementById('deleteModal'))
    document.getElementById('deleteModal').classList.remove('open');
});

/* ── 달력 네비 ── */
document.getElementById('prevMonth').addEventListener('click', () => {
  state.calMonth--;
  if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
  renderCalendar();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  state.calMonth++;
  if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
  renderCalendar();
});

/* ── 메모 ── */
let memoTimer;
document.getElementById('memoArea').addEventListener('input', e => {
  clearTimeout(memoTimer);
  memoTimer = setTimeout(() => {
    state.memos[state.selectedDate] = e.target.value;
    save();
    renderCalendar();
    showToast('저장됨 ✓');
  }, 800);
});

/* ── 리포트 ── */
let reportPeriod = 'week';
document.querySelectorAll('.report-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.report-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    reportPeriod = tab.dataset.period;
    renderReport();
  });
});

function getWeekRange() {
  const today = new Date();
  const dow = today.getDay();
  const mon = new Date(today); mon.setDate(today.getDate() - ((dow + 6) % 7));
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  return { start: mon, end: sun };
}
function getMonthRange() {
  const today = new Date();
  return {
    start: new Date(today.getFullYear(), today.getMonth(), 1),
    end: new Date(today.getFullYear(), today.getMonth() + 1, 0),
  };
}
function datesBetween(start, end) {
  const dates = [], cur = new Date(start);
  while (cur <= end) {
    const y = cur.getFullYear(), m = String(cur.getMonth()+1).padStart(2,'0'), d = String(cur.getDate()).padStart(2,'0');
    dates.push(`${y}-${m}-${d}`);
    cur.setDate(cur.getDate() + 1);
  }
  return dates;
}
function fmtDateShort(d) {
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  return `${months[d.getMonth()]} ${d.getDate()}일`;
}

function renderReport() {
  const { start, end } = reportPeriod === 'week' ? getWeekRange() : getMonthRange();
  const dates = datesBetween(start, end);
  const totals = {};
  let grandTotal = 0;
  dates.forEach(dk => {
    const tl = state.timeline[dk] || {};
    Object.values(tl).forEach(catId => {
      totals[catId] = (totals[catId] || 0) + 1;
      grandTotal++;
    });
  });
  const periodLabel = reportPeriod === 'week'
    ? `${fmtDateShort(start)} — ${fmtDateShort(end)}`
    : `${start.getFullYear()}년 ${start.getMonth()+1}월`;
  const active = state.categories
    .map(c => ({ ...c, min: (totals[c.id] || 0) * SLOT_MIN }))
    .filter(c => c.min > 0)
    .sort((a,b) => b.min - a.min);
  const maxMin = active.length ? Math.max(...active.map(c => c.min)) : 1;
  const barsHTML = active.length === 0
    ? '<div class="empty-state" style="padding:16px 0">이 기간엔 기록이 없어요</div>'
    : active.map(c => `
        <div class="bar-row">
          <div class="bar-label" title="${c.name}">${c.name}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${(c.min/maxMin)*100}%;background:${c.color}"></div>
          </div>
          <div class="bar-time">${fmtMin(c.min)}</div>
        </div>
      `).join('');
  document.getElementById('reportContent').innerHTML = `
    <div class="report-period">${periodLabel}</div>
    <div class="report-sub">${reportPeriod === 'week' ? '주간' : '월간'} 리포트 · ${dates.length}일</div>
    <div class="report-bars">${barsHTML}</div>
    <div class="report-total-row">
      <span class="total-label">총 기록</span>
      <span class="total-val">${grandTotal > 0 ? fmtMin(grandTotal * SLOT_MIN) : '0m'}</span>
    </div>
  `;
}

/* ── 토스트 ── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ── 서비스워커 ── */
if ('serviceWorker' in navigator) {
  const host = location.hostname;
  if (host === 'localhost' || host.endsWith('github.io')) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw_time-tracker.js')
        .catch(err => console.warn('SW 등록 실패:', err));
    });
  }
}

  load();
  const now = new Date();
  state.calYear = now.getFullYear();
  state.calMonth = now.getMonth();
  renderColorPicker();
  renderCatManageList();
  selectDate(todayStr());
}

init();
</script>
